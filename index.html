<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>James US Retail — operating plan</title>
<style>
  :root{
    --ink:#16181d; --ink-2:#3c4048; --ink-3:#6b7078; --ink-4:#9aa0a8;
    --line:#e7e8ea; --line-2:#f0f1f2; --bg:#ffffff; --bg-2:#fafafa;
    --backbone:#b87a2b; --depth:#3a6ea5; --magnet:#4f8a63; --conv:#8a6aa8;
    --maxw:780px;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Inter,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    font-size:16px; line-height:1.62; -webkit-font-smoothing:antialiased;
  }
  a{color:inherit}
  .wrap{display:grid; grid-template-columns:256px 1fr; max-width:1200px; margin:0 auto;}
  nav.side{
    position:sticky; top:0; align-self:start; height:100vh; overflow-y:auto;
    padding:48px 26px 48px 36px; border-right:1px solid var(--line);
  }
  .brand{font-size:13px; letter-spacing:.02em; color:var(--ink-3); margin-bottom:4px;}
  .brand b{color:var(--ink); font-weight:600;}
  .side-sub{font-size:12px; color:var(--ink-4); margin-bottom:30px; line-height:1.5;}
  nav.side ol{list-style:none; margin:0; padding:0; counter-reset:s;}
  nav.side a.navlink{
    display:flex; gap:11px; align-items:baseline; padding:6.5px 0; counter-increment:s;
    font-size:13.5px; color:var(--ink-3); text-decoration:none; line-height:1.4;
  }
  nav.side a.navlink::before{
    content:counter(s,decimal-leading-zero); font-variant-numeric:tabular-nums;
    font-size:11px; color:var(--ink-4); min-width:18px;
  }
  nav.side a.navlink:hover{color:var(--ink);}
  nav.side a.navlink.active{color:var(--ink); font-weight:600;}
  nav.side a.navlink.active::before{color:var(--ink);}
  main{padding:64px 56px 140px; min-width:0;}
  .col{max-width:var(--maxw);}
  .eyebrow{font-size:12px; letter-spacing:.07em; text-transform:uppercase; color:var(--ink-4); margin:0 0 14px;}
  h1{font-size:33px; line-height:1.2; letter-spacing:-.018em; margin:0 0 16px; font-weight:660;}
  .lede{font-size:18px; line-height:1.55; color:var(--ink-2); margin:0 0 18px; max-width:690px;}
  .meta-row{display:flex; flex-wrap:wrap; gap:8px 22px; font-size:12.5px; color:var(--ink-3); border-top:1px solid var(--line); border-bottom:1px solid var(--line); padding:14px 0; margin:26px 0 0;}
  .meta-row b{color:var(--ink); font-weight:600;}
  section{padding:60px 0 0; scroll-margin-top:28px;}
  section > .num{font-size:12px; color:var(--ink-4); font-variant-numeric:tabular-nums; letter-spacing:.04em;}
  h2{font-size:25px; line-height:1.25; letter-spacing:-.014em; margin:8px 0 6px; font-weight:640;}
  .sectsub{color:var(--ink-3); font-size:15px; margin:0 0 26px; max-width:670px;}
  h3{font-size:16.5px; margin:30px 0 8px; font-weight:640; letter-spacing:-.005em;}
  p{margin:0 0 15px; color:var(--ink-2);}
  p strong, li strong{color:var(--ink); font-weight:620;}
  .cn{font-family:-apple-system,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;}
  ul.clean{margin:0 0 16px; padding:0; list-style:none;}
  ul.clean li{position:relative; padding:0 0 11px 18px; color:var(--ink-2); font-size:15px;}
  ul.clean li::before{content:""; position:absolute; left:2px; top:11px; width:4px; height:4px; border-radius:50%; background:var(--ink-4);}
  hr{border:0; border-top:1px solid var(--line); margin:34px 0;}
  .pull{border-left:2px solid var(--ink); padding:2px 0 2px 20px; margin:24px 0; font-size:17px; line-height:1.5; color:var(--ink); max-width:650px;}
  .note{font-size:13.5px; color:var(--ink-3); background:var(--bg-2); border:1px solid var(--line); border-radius:9px; padding:15px 18px; margin:20px 0;}
  .note b{color:var(--ink);}
  /* CMO reads */
  .reads{counter-reset:r; margin:6px 0 0;}
  .read{counter-increment:r; padding:20px 0; border-top:1px solid var(--line); display:grid; grid-template-columns:30px 1fr; gap:16px;}
  .read:last-child{border-bottom:1px solid var(--line);}
  .read::before{content:"R" counter(r); font-size:11px; font-weight:600; color:var(--ink-4); letter-spacing:.03em; padding-top:3px;}
  .read h4{margin:0 0 6px; font-size:16.5px; font-weight:640; letter-spacing:-.005em; line-height:1.32;}
  .read p{margin:0; font-size:14.5px;}
  /* dot */
  .dot{display:inline-block; width:8px; height:8px; border-radius:50%; vertical-align:middle; margin-right:7px; flex:0 0 auto;}
  .dot.backbone{background:var(--backbone)} .dot.depth{background:var(--depth)}
  .dot.magnet{background:var(--magnet)} .dot.conv{background:var(--conv)} .dot.ink{background:var(--ink)} .dot.grey{background:var(--ink-4)}
  /* funnel */
  .funnel{margin:10px 0 8px;}
  .fstage{border:1px solid var(--line); border-radius:12px; padding:20px 22px; margin:0 0 4px; position:relative;}
  .fstage .tag{font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--ink-4); font-weight:600; margin-bottom:6px; display:flex; align-items:center;}
  .fstage h4{margin:0 0 6px; font-size:18px; font-weight:650; letter-spacing:-.01em;}
  .fstage h4 .cn{font-weight:600; color:var(--ink-3); font-size:15px; margin-left:8px;}
  .fstage p{margin:0 0 4px; font-size:14px;}
  .fstage .meta{font-size:12.5px; color:var(--ink-3); margin-top:9px;}
  .fstage .meta b{color:var(--ink);}
  .farrow{text-align:center; color:var(--ink-4); font-size:16px; line-height:1; margin:7px 0;}
  .split{display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:4px;}
  .lane{border:1px solid var(--line); border-radius:12px; padding:18px 20px;}
  .lane.whale{border-color:#cfd2d6;}
  .lane h5{margin:0 0 5px; font-size:15px; font-weight:650; display:flex; align-items:center;}
  .lane .who{font-size:12px; color:var(--ink-4); margin-bottom:9px;}
  .lane p{margin:0; font-size:13.5px;}
  .lane .own{font-size:12px; color:var(--ink-3); margin-top:10px; padding-top:9px; border-top:1px solid var(--line-2);}
  .lane .own b{color:var(--ink);}
  /* pyramid */
  .tier{display:grid; grid-template-columns:64px 1fr; gap:18px; align-items:start; padding:18px 0; border-top:1px solid var(--line);}
  .tier:last-child{border-bottom:1px solid var(--line);}
  .tier .pct{font-size:25px; font-weight:660; letter-spacing:-.02em; font-variant-numeric:tabular-nums; line-height:1;}
  .tier .pct small{display:block; font-size:11px; font-weight:500; color:var(--ink-4); letter-spacing:.05em; text-transform:uppercase; margin-top:6px;}
  .tier .body h4{margin:0 0 3px; font-size:16px; font-weight:640; display:flex; align-items:center; flex-wrap:wrap;}
  .tier .body .role{font-size:13px; color:var(--ink-3); margin:0 0 7px;}
  .tier .body p{font-size:14px; margin:0; color:var(--ink-2);}
  .tier .body .fmt{font-size:12.5px; color:var(--ink-3); margin-top:7px;}
  .tier .body .fmt b{color:var(--ink);}
  .legend{display:flex; flex-wrap:wrap; gap:7px 22px; font-size:13px; color:var(--ink-2); margin:0 0 24px;}
  .legend span{display:flex; align-items:center;}
  /* launch */
  .lrow{display:grid; grid-template-columns:30px 1fr auto; gap:14px; align-items:start; padding:14px 0; border-top:1px solid var(--line);}
  .lrow:last-child{border-bottom:1px solid var(--line);}
  .lrow .ix{font-size:13px; color:var(--ink-4); font-variant-numeric:tabular-nums; padding-top:2px;}
  .lrow .t .h{font-weight:600; font-size:15px; color:var(--ink); margin-bottom:2px; display:flex; align-items:center;}
  .lrow .t .d{font-size:13.5px; color:var(--ink-3);}
  .lrow .t .src{font-size:11.5px; color:var(--ink-4); font-variant-numeric:tabular-nums;}
  .lrow .fm{font-size:11.5px; color:var(--ink-3); text-align:right; white-space:nowrap; padding-top:2px;}
  /* phases */
  .phase{display:grid; grid-template-columns:96px 1fr; gap:20px; padding:18px 0; border-top:1px solid var(--line);}
  .phase:last-child{border-bottom:1px solid var(--line);}
  .phase .w{font-size:13px; font-weight:600; color:var(--ink); padding-top:1px;}
  .phase .w small{display:block; font-weight:500; color:var(--ink-4); font-size:11px; margin-top:2px;}
  .phase .c h4{margin:0 0 5px; font-size:15.5px; font-weight:620;}
  .phase .c p{margin:0; font-size:14px;}
  /* table */
  .ttools{display:flex; flex-wrap:wrap; gap:8px; margin:0 0 18px; align-items:center;}
  .ttools .lbl{font-size:12px; color:var(--ink-4); margin-right:2px;}
  .filt{font-size:12.5px; padding:5px 12px; border:1px solid var(--line); background:#fff; border-radius:99px; cursor:pointer; color:var(--ink-2); display:inline-flex; align-items:center;}
  .filt:hover{border-color:var(--ink-4);}
  .filt.on{border-color:var(--ink); color:var(--ink); font-weight:600;}
  table.topics{width:100%; border-collapse:collapse; font-size:13.5px;}
  table.topics th{text-align:left; font-size:11px; letter-spacing:.04em; text-transform:uppercase; color:var(--ink-4); font-weight:600; padding:0 10px 9px 0; border-bottom:1px solid var(--line);}
  table.topics td{padding:10px 10px 10px 0; border-bottom:1px solid var(--line-2); vertical-align:top; color:var(--ink-2);}
  table.topics td.n{color:var(--ink-4); font-variant-numeric:tabular-nums; white-space:nowrap;}
  table.topics td.ttl{color:var(--ink); width:100%;}
  table.topics td.ttl .star{color:var(--ink); font-weight:700; margin-left:5px;}
  table.topics td.ly{white-space:nowrap;}
  table.topics td.fmt{white-space:nowrap; color:var(--ink-3); font-size:12.5px;}
  table.topics tr.hide{display:none;}
  table.topics tr.grp td{background:var(--bg-2); color:var(--ink-3); font-size:11.5px; letter-spacing:.03em; text-transform:uppercase; font-weight:600; padding-top:16px;}
  .foot{margin-top:60px; padding-top:22px; border-top:1px solid var(--line); font-size:12.5px; color:var(--ink-4); max-width:var(--maxw);}
  @media (max-width:880px){
    .wrap{grid-template-columns:1fr;}
    nav.side{position:static; height:auto; border-right:0; border-bottom:1px solid var(--line); padding:30px 24px;}
    nav.side ol{columns:2; column-gap:18px;}
    main{padding:40px 24px 100px;}
    h1{font-size:27px;}
    .split{grid-template-columns:1fr;}
  }
</style>

<style>
  body.locked{overflow:hidden}
  .tabbar{position:sticky;top:0;z-index:60;display:flex;align-items:center;gap:4px;height:48px;padding:0 22px;background:rgba(255,255,255,.9);-webkit-backdrop-filter:saturate(180%) blur(14px);backdrop-filter:saturate(180%) blur(14px);border-bottom:1px solid var(--line)}
  .tabbar .tab{font-size:13.5px;color:var(--ink-3);text-decoration:none;padding:6px 13px;border-radius:8px;font-weight:500;white-space:nowrap}
  .tabbar .tab:hover{color:var(--ink);background:var(--bg-2)}
  .tabbar .tab.active{color:var(--ink);font-weight:640;background:var(--line-2)}
  .tabbar .sp{flex:1}
  .tabbar .bz{font-size:12px;color:var(--ink-4);white-space:nowrap}
  nav.side{top:48px;height:calc(100vh - 48px)}
  section{scroll-margin-top:62px}
  /* brief page */
  .briefmain{padding:40px 56px 120px;max-width:860px;margin:0 auto}
  .grouphd{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-4);font-weight:600;margin:42px 0 14px;padding-bottom:9px;border-bottom:1px solid var(--line)}
  .subhd{font-size:15px;font-weight:640;color:var(--ink);margin:30px 0 4px}
  .zlist{margin:0}
  .zitem{display:grid;grid-template-columns:74px 1fr;gap:16px;padding:13px 0;border-top:1px solid var(--line-2)}
  .zitem:first-child{border-top:0}
  .zitem .zn{font-size:12px;color:var(--ink-4);font-weight:600;padding-top:2px}
  .zitem b{font-size:15px;font-weight:640}
  .zitem .zd{font-size:13.5px;color:var(--ink-3);margin-top:2px}
  .tlist{list-style:none;margin:0;padding:0}
  .tlist li{display:grid;grid-template-columns:32px 1fr;gap:12px;padding:11px 0;border-top:1px solid var(--line-2)}
  .tlist li .tn{font-size:12.5px;color:var(--ink-4);font-variant-numeric:tabular-nums;padding-top:2px}
  .tlist li .tt{font-size:14.5px;color:var(--ink);line-height:1.5}
  .tlist li .tt .sub{display:block;font-size:13px;color:var(--ink-3);margin-top:3px;line-height:1.45}
  @media (max-width:880px){.briefmain{padding:28px 22px 90px}.zitem{grid-template-columns:60px 1fr;gap:12px}}
</style>

<style>
  #gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:80}
  #gate-card{width:320px;max-width:86vw}
  #gate-card .gk{font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-4);margin-bottom:8px}
  #gate-card h2{font-size:17px;font-weight:600;margin:0 0 16px;color:var(--ink);letter-spacing:-.01em}
  #gate-form{display:flex;gap:8px}
  #gate-input{flex:1;padding:9px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;outline:none;font-family:inherit}
  #gate-input:focus{border-color:var(--ink-4)}
  #gate-btn{padding:9px 16px;border:1px solid var(--ink);background:var(--ink);color:#fff;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit}
  #gate-err{font-size:12px;color:#b22;margin-top:10px;min-height:14px}
</style>
</head>

<script>
function b64ToBytes(b64){var bin=atob(b64);var a=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a;}
async function deriveKey(pw,salt,it){var enc=new TextEncoder();var bk=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);return crypto.subtle.deriveKey({name:"PBKDF2",salt:salt,iterations:it,hash:"SHA-256"},bk,{name:"AES-GCM",length:256},false,["decrypt"]);}
async function decryptPayload(pw){var b=JSON.parse(document.getElementById('payload').textContent);var key=await deriveKey(pw,b64ToBytes(b.salt),b.iterations);var plain=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64ToBytes(b.iv)},key,b64ToBytes(b.ciphertext));return new TextDecoder().decode(plain);}
function reveal(h){document.getElementById('content').innerHTML=h;document.getElementById('content').hidden=false;document.getElementById('gate').style.display='none';document.body.classList.remove('locked');initPage();}
async function gateSubmit(e){e.preventDefault();var inp=document.getElementById('gate-input');var err=document.getElementById('gate-err');err.textContent='';try{var h=await decryptPayload(inp.value);reveal(h);try{localStorage.setItem('james_pw',inp.value);}catch(_){}}catch(ex){err.textContent='wrong password';inp.value='';inp.focus();}return false;}
(async function(){try{var c=localStorage.getItem('james_pw');if(c){reveal(await decryptPayload(c));}}catch(_){try{localStorage.removeItem('james_pw');}catch(_){}}})();
function initPage(){
  var links=[].slice.call(document.querySelectorAll('nav.side a.navlink'));
  var secs=links.map(function(a){return document.querySelector(a.getAttribute('href'));});
  function onScroll(){var y=window.scrollY+140,idx=0;for(var i=0;i<secs.length;i++){if(secs[i]&&secs[i].offsetTop<=y)idx=i;}links.forEach(function(l,i){l.classList.toggle('active',i===idx);});}
  if(links.length){window.addEventListener('scroll',onScroll,{passive:true});onScroll();}
  var btns=[].slice.call(document.querySelectorAll('.filt'));
  var rows=[].slice.call(document.querySelectorAll('#tbody tr[data-l]'));
  var grps=[].slice.call(document.querySelectorAll('#tbody tr.grp'));
  btns.forEach(function(b){b.addEventListener('click',function(){btns.forEach(function(x){x.classList.remove('on');});b.classList.add('on');var f=b.getAttribute('data-f');rows.forEach(function(r){var show=f==='all'||(f==='star'?r.getAttribute('data-star')==='1':r.getAttribute('data-l')===f);r.classList.toggle('hide',!show);});grps.forEach(function(g){var any=false,n=g.nextElementSibling;while(n&&!n.classList.contains('grp')){if(n.hasAttribute('data-l')&&!n.classList.contains('hide'))any=true;n=n.nextElementSibling;}g.classList.toggle('hide',!any);});});});
}
</script>
